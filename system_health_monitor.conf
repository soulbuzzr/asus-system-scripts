# ================= CPU =================
CPU_ACTIVE_THRESHOLD=60

# ================= SSD TEMPERATURE =================
SSD_TEMP_WARN=46

# ================= SSD HEALTH THRESHOLDS =================
# Samsung PCIe Gen4 SSD
SSD_SAMSUNG_HEALTH_WARN=86
SSD_SAMSUNG_HEALTH_CRIT=80

# Crucial PCIe Gen3 SSD
SSD_CRUCIAL_HEALTH_WARN=92
SSD_CRUCIAL_HEALTH_CRIT=80

# ===== DUST / COOLING DETECTION =====

# CPU considered "idle / light load" below this
DUST_CPU_ACTIVE_MAX=10      # %

# Temperature considered too high for low CPU
DUST_CPU_TEMP_MIN=57         # °C

# Condition must persist for this long (in minutes)
DUST_DETECT_DURATION=5

# Mean Absolute Deviation (MAD)
DUST_CPU_TEMP_MAD_MAX=2

# ================= BATTERY THRESHOLDS =================

# Battery health (degradation)
BATTERY_HEALTH_WARN=76
BATTERY_HEALTH_CRIT=60

# Battery health check interval (seconds)
BATTERY_HEALTH_INTERVAL=1800   # 30 minutes

# Battery charge level
BATTERY_CHARGE_WARN=40
BATTERY_CHARGE_CRIT=30

# Check interval (seconds)
BATTERY_CHECK_INTERVAL=60
