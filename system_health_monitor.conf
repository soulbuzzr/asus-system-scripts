# ================= CPU =================
CPU_ACTIVE_THRESHOLD=90

# ================= SSD TEMPERATURE =================
SSD_TEMP_WARN=46

# ================= SSD HEALTH THRESHOLDS =================
# Samsung PCIe Gen4 SSD
SSD_SAMSUNG_HEALTH_WARN=92
SSD_SAMSUNG_HEALTH_CRIT=80

# Crucial PCIe Gen3 SSD
SSD_CRUCIAL_HEALTH_WARN=86
SSD_CRUCIAL_HEALTH_CRIT=80

# ===== DUST / COOLING DETECTION =====

# CPU considered "idle / light load" below this
DUST_CPU_ACTIVE_MAX=10        # %

# Temperature considered too high for low CPU
DUST_CPU_TEMP_MIN=55         # °C

# Condition must persist for this long, should be multiples of 60
DUST_DETECT_DURATION=60     # seconds (5 minutes)
